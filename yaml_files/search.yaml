jobs:
  css: 'li div.base-card'
  multiple: true
  type: Text
  children:
    job_id:
      css: 'div.base-card'
      type: Attribute
      attribute: data-entity-urn
    title:
      css: 'h3.base-search-card__title'
      type: Text
    company:
      css: 'h4.base-search-card__subtitle'
      type: Text
    location:
      css: 'span.job-search-card__location'
      type: Text
    publication_date:
      css: 'time'
      type: Attribute
      attribute: datetime
    url:
      css: 'a.base-card__full-link'
      type: Link
